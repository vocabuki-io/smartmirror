name: scrape-train-delay
on:
  schedule:
    - cron: "*/10 * * * *"   # 10分毎(UTC基準/GitHub都合で数分ずれる)
  workflow_dispatch:          # 手動実行も可
permissions:
  contents: write
concurrency:                  # 多重起動を防ぐ
  group: delay-scrape
  cancel-in-progress: true
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scrape
        run: python3 scrape_delay.py
      - name: Commit if changed
        run: |
          if ! git diff --quiet -- delay.json; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add delay.json
            git commit -m "update delay.json [skip ci]"
            git push
          else
            echo "no change"
          fi
